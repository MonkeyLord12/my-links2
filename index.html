<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>da2pickle | Digital Card</title>
    <style>
        :root {
            --bg-color: #050505;
            --accent-color: #ff3c00; /* Intense red from the eyes */
            --glass-bg: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(255, 50, 0, 0.2);
            --text-color: #f8fafc;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(255, 60, 0, 0.1) 0%, transparent 70%);
            color: var(--text-color);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            overflow: hidden;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 40px 24px;
            max-width: 380px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.9);
            animation: cardAppear 1s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            z-index: 10;
        }

        @keyframes cardAppear {
            from { opacity: 0; transform: scale(0.9) translateY(40px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .profile {
            margin-bottom: 32px;
            position: relative;
        }

        .avatar-box {
            width: 160px;
            height: 160px;
            margin: 0 auto 16px auto;
            border-radius: 32px;
            overflow: hidden;
            border: 3px solid var(--accent-color);
            box-shadow: 0 0 25px var(--accent-color);
        }

        .avatar-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            font-size: 26px;
            margin: 0 0 8px 0;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: #fff;
            text-shadow: 0 0 10px var(--accent-color);
        }

        .bio {
            font-size: 14px;
            color: #94a3b8;
            margin: 0 0 32px 0;
            line-height: 1.5;
            font-style: italic;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .link-card {
            background: rgba(255, 0, 60, 0.05);
            color: var(--text-color);
            text-decoration: none;
            padding: 16px;
            border-radius: 16px;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: pointer;
        }

        .link-card:hover {
            background: rgba(255, 0, 60, 0.15);
            transform: translateY(-3px);
            border-color: var(--accent-color);
            box-shadow: 0 10px 20px -5px rgba(255, 0, 60, 0.3);
            color: #fff;
        }

        .link-card::before {
            content: '';
            position: absolute;
            left: 20px;
            width: 20px;
            height: 20px;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .link-card[data-icon="tiktok"]::before { content: '🎵'; }
        .link-card[data-icon="youtube"]::before { content: '📺'; }
        .link-card[data-icon="twitch"]::before { content: '💜'; }

        /* Player Styles - Variant 2 */
        .music-player {
            margin-top: 24px;
            padding: 16px;
            background: rgba(255, 60, 0, 0.08);
            border: 1px solid rgba(255, 60, 0, 0.3);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            animation: playerFadeIn 1s ease;
        }

        @keyframes playerFadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .player-info {
            display: flex;
            align-items: center;
            gap: 10px;
            text-align: left;
            flex: 1;
        }

        .player-info span {
            font-size: 13px;
            font-weight: 600;
            color: #f8fafc;
            letter-spacing: 0.5px;
        }

        .play-btn {
            width: 42px;
            height: 42px;
            border-radius: 12px; 
            border: none;
            background: var(--accent-color);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(255, 60, 0, 0.3);
            flex-shrink: 0;
        }

        .play-btn:hover {
            transform: scale(1.05);
            filter: brightness(1.1);
        }

        .music-visualizer {
            display: flex;
            align-items: flex-end;
            gap: 2px;
            height: 12px;
            margin-right: 8px;
        }

        .bar {
            width: 2px;
            background: var(--accent-color);
            height: 20%;
            transition: height 0.2s ease;
        }

        .playing .bar {
            animation: bounce 0.7s ease-in-out infinite alternate;
        }

        @keyframes bounce {
            from { height: 20%; }
            to { height: 100%; }
        }

        .bar:nth-child(2) { animation-delay: 0.15s; }
        .bar:nth-child(3) { animation-delay: 0.3s; }

    </style>
</head>
<body>

    <div class="glass-card">
        <div class="profile">
            <div class="avatar-box">
                <img id="avatar" src="avatar.gif" alt="Avatar">
            </div>
            <h1 id="name">Loading...</h1>
            <p id="bio" class="bio">Loading...</p>
        </div>

        <div id="links" class="links-container">
        </div>

        <div class="music-player">
            <div class="player-info">
                <div class="music-visualizer" id="visualizer">
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                </div>
                <span>Lofi Radio ☕</span>
            </div>
            <button id="playBtn" class="play-btn">▶</button>
        </div>
    </div>

    <audio id="radioPlayer" src="https://stream.laut.fm/lofi-radio" preload="auto"></audio>

    <script>
        const data = {
            "name": "da2pickle",
            "bio": "No thanks, bro.",
            "avatar": "avatar.gif",
            "links": [
                { "title": "TikTok", "url": "https://www.tiktok.com/@usedbyme34", "icon": "tiktok" },
                { "title": "YouTube", "url": "https://www.youtube.com/@coronkil", "icon": "youtube" },
                { "title": "Twitch", "url": "https://www.twitch.tv/da2pickle", "icon": "twitch" }
            ]
        };

        function renderPage() {
            try {
                document.getElementById('avatar').src = data.avatar;
                document.getElementById('name').innerText = data.name;
                document.getElementById('bio').innerText = data.bio;

                const linksDiv = document.getElementById('links');
                linksDiv.innerHTML = '';

                data.links.forEach(link => {
                    const a = document.createElement('a');
                    a.href = link.url;
                    a.className = 'link-card';
                    a.target = '_blank';
                    a.rel = 'noopener noreferrer';
                    a.setAttribute('data-icon', link.icon);
                    a.innerText = link.title;
                    linksDiv.appendChild(a);
                });
            } catch (e) {
                console.error('Render error:', e);
            }
        }

        // Player Logic
        const audio = document.getElementById('radioPlayer');
        const playBtn = document.getElementById('playBtn');
        const visualizer = document.getElementById('visualizer');

        playBtn.onclick = () => {
            if (audio.paused) {
                audio.play().then(() => {
                    playBtn.innerText = '⏸';
                    visualizer.classList.add('playing');
                }).catch(err => {
                    console.error('Playback failed:', err);
                    alert('Please interact with the page first to enable audio.');
                });
            } else {
                audio.pause();
                playBtn.innerText = '▶';
                visualizer.classList.remove('playing');
            }
        };

        renderPage();
    </script>
</body>
</html>
